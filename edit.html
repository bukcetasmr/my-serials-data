<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Редактировать сериалы</title>

<style>
:root {
  --accent: #ffb400;
  --bg: #121212;
  --card: #1e1e1e;
}

body {
  font-family: "Segoe UI", sans-serif;
  background: var(--bg);
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  padding: 40px;
}

.themeBox { position: fixed; top: 15px; right: 15px; display: flex; gap: 5px; }
select { background: #1e1e1e; color: white; border: 1px solid var(--accent); padding: 5px; }

#linksContainer {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  width: 100%;
  max-width: 1200px;
}

h1 { color: var(--accent); }

input { width: 100%; padding: 10px; margin-bottom: 8px; border: 2px solid var(--accent); border-radius: 6px; background-color: #1e1e1e; color: #fff; }

.button { background-color: var(--card); border: 2px solid var(--accent); color: var(--accent); padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
.button:hover { background: var(--accent); color: black; }

.linkBlock { padding: 15px; border: 1px solid #444; border-radius: 10px; background: rgba(30,30,30,0.8); }
.controls { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
.dragging { opacity: 0.5; }
.saveCheck { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #22c55e; font-size: 18px; opacity: 0; transition: opacity 0.3s; }
.saveCheck.show { opacity: 1; }

.glass .button { backdrop-filter: blur(10px); background: rgba(30,30,30,0.6); }
.neon .button { box-shadow: 0 0 10px var(--accent); }
.soft .button { border-radius: 20px; }
.minimal .button { border: none; border-bottom: 2px solid var(--accent); }
.bold .button { font-weight: bold; }

</style>
</head>

<body>

<div class="themeBox">
  <select id="colorSelect">
    <option value="#ffb400">🟠</option>
    <option value="#a855f7">🟣</option>
    <option value="#22c55e">🟢</option>
    <option value="#3b82f6">🔵</option>
    <option value="#ef4444">🔴</option>
    <option value="#ec4899">🌸</option>
  </select>

  <select id="styleSelect">
    <option value="">Default</option>
    <option value="glass">Glass</option>
    <option value="neon">Neon</option>
    <option value="soft">Soft</option>
    <option value="minimal">Minimal</option>
    <option value="bold">Bold</option>
  </select>
</div>

<a class="button" href="Serials.html">← На главную</a>
<button class="button" onclick="loadFromCloud()">🔄 Обновить из облака</button>

<h1>Редактировать сериалы</h1>

<div style="display:flex; gap:5px; flex-wrap:wrap;">
  <button class="button" onclick="saveChanges()">💾 Сохранить
    <span class="saveCheck" id="saveCheck">✔</span>
  </button>
  <button class="button" onclick="addNewLink()">➕ Добавить</button>
  <button class="button" onclick="exportLinks()">📤 Экспорт</button>
  <button class="button" onclick="importLinks()">📥 Импорт</button>
</div>

<input type="file" id="fileInput" style="display:none;">

<div id="linksContainer"></div>

<script>
const CLOUD_URL_BASE = "https://raw.githubusercontent.com/bukcetasmr/my-serials-data/refs/heads/main/my-serials.json";

let links = JSON.parse(localStorage.getItem("myLinks")) || [];
const container = document.getElementById("linksContainer");
const saveCheck = document.getElementById("saveCheck");

let draggedIndex = null;

function renderInputs() {
  container.innerHTML = "";

  links.forEach((link, i) => {
    const div = document.createElement("div");
    div.className = "linkBlock";
    div.draggable = true;
    div.dataset.index = i;

    div.innerHTML = `
      <input value="${link.name}">
      <input value="${link.url}">
      <div class="controls">
        <button class="button" onclick="moveUp(${i})">⬆</button>
        <button class="button" onclick="moveDown(${i})">⬇</button>
        <button class="button" onclick="deleteLink(${i})">🗑</button>
      </div>
    `;

    div.addEventListener("dragstart", () => { draggedIndex = i; div.classList.add("dragging"); });
    div.addEventListener("dragend", () => { div.classList.remove("dragging"); });

    container.appendChild(div);
  });
}

container.addEventListener("dragover", (e) => {
  e.preventDefault();
  const afterElement = getClosestElement(e.clientX, e.clientY);
  const dragging = document.querySelector(".dragging");
  if (!dragging) return;
  if (!afterElement) container.appendChild(dragging);
  else container.insertBefore(dragging, afterElement);
});

function getClosestElement(x, y) {
  const elements = [...container.querySelectorAll(".linkBlock:not(.dragging)")];
  let closest = null;
  let closestDistance = Infinity;
  elements.forEach(el => {
    const rect = el.getBoundingClientRect();
    const dx = x - (rect.left + rect.width/2);
    const dy = y - (rect.top + rect.height/2);
    const distance = Math.sqrt(dx*dx + dy*dy);
    if (distance < closestDistance) { closestDistance = distance; closest = el; }
  });
  return closest;
}

container.addEventListener("drop", () => {
  updateLinksFromInputs();
});

function moveUp(i){ if(i===0)return; [links[i],links[i-1]]=[links[i-1],links[i]]; renderInputs(); }
function moveDown(i){ if(i===links.length-1)return; [links[i],links[i+1]]=[links[i+1],links[i]]; renderInputs(); }
function deleteLink(i){ if(!confirm("Удалить?"))return; links.splice(i,1); renderInputs(); }
function addNewLink(){ links.unshift({name:"Новый сериал",url:""}); renderInputs(); }

function updateLinksFromInputs() {
  const blocks = container.querySelectorAll(".linkBlock");
  links = [...blocks].map(block => {
    const inputs = block.querySelectorAll("input");
    return { name: inputs[0].value, url: inputs[1].value };
  });
}

function saveChanges(){
  updateLinksFromInputs();
  localStorage.setItem("myLinks", JSON.stringify(links));
  renderInputs();
  saveCheck.classList.add("show");
  setTimeout(()=>saveCheck.classList.remove("show"),2000);
}

function exportLinks(){
  updateLinksFromInputs();
  const blob = new Blob([JSON.stringify(links,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "my-serials.json";
  a.click();
}

function importLinks(){
  const input = document.getElementById("fileInput");
  input.click();
  input.onchange = () => {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = e => {
      links = JSON.parse(e.target.result);
      renderInputs();
    };
    reader.readAsText(file);
  };
}

async function loadFromCloud() {
  try {
    const url = CLOUD_URL_BASE + "?t=" + Date.now();
    const res = await fetch(url, { cache: "no-store" });
    links = await res.json();
    localStorage.setItem("myLinks", JSON.stringify(links));
    renderInputs();
    alert("Обновлено из облака ☁️");
  } catch (e) {
    alert("Ошибка загрузки из облака");
  }
}

const colorSelect=document.getElementById("colorSelect");
const styleSelect=document.getElementById("styleSelect");

function applyTheme(){
  document.documentElement.style.setProperty('--accent',colorSelect.value);
  document.body.className=styleSelect.value;
  localStorage.setItem("themeColor",colorSelect.value);
  localStorage.setItem("themeStyle",styleSelect.value);
}

colorSelect.value=localStorage.getItem("themeColor")||"#ffb400";
styleSelect.value=localStorage.getItem("themeStyle")||"";

applyTheme();

colorSelect.onchange=applyTheme;
styleSelect.onchange=applyTheme;

renderInputs();
</script>

</body>
</html>
