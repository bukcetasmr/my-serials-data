<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Редактировать сериалы</title>

<style>
:root { --accent: #ffb400; --bg: #121212; --card: #1e1e1e; }
body { font-family: "Segoe UI", sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 40px; }

.themeBox { position: fixed; top: 15px; right: 15px; display: flex; gap: 5px; z-index: 100; }
select { background: #1e1e1e; color: white; border: 1px solid var(--accent); padding: 5px; border-radius: 4px; }

.token-box {
  background: var(--card); border: 1px dashed var(--accent); padding: 15px; border-radius: 10px;
  width: 100%; max-width: 400px; text-align: center; margin-bottom: 10px;
}
.token-box label { font-size: 11px; color: var(--accent); display: block; margin-bottom: 5px; }
.token-box input { margin-bottom: 0; font-size: 12px; padding: 8px; border: 1px solid #444; }

#linksContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; }
h1 { color: var(--accent); }
input { width: 100%; padding: 10px; margin-bottom: 8px; border: 2px solid var(--accent); border-radius: 6px; background-color: #1e1e1e; color: #fff; box-sizing: border-box; }
.button { background-color: var(--card); border: 2px solid var(--accent); color: var(--accent); padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: bold; }
.button:hover { background: var(--accent); color: black; transform: scale(1.02); }

.linkBlock { padding: 15px; border: 1px solid #444; border-radius: 10px; background: rgba(30,30,30,0.8); position: relative; }
.controls { display: flex; gap: 5px; margin-top: 5px; }
.dragging { opacity: 0.5; }
.saveCheck { margin-left: 5px; color: #22c55e; display: none; }
.saveCheck.show { display: inline; }

/* Темы */
.glass .button { backdrop-filter: blur(10px); background: rgba(30,30,30,0.6); }
.neon .button { box-shadow: 0 0 10px var(--accent); }
.soft .button { border-radius: 20px; }
.minimal .button { border: none; border-bottom: 2px solid var(--accent); }
.bold .button { font-weight: bold; }
</style>
</head>

<body>

<div class="themeBox">
  <select id="colorSelect">
    <option value="#ffb400">🟠</option>
    <option value="#a855f7">🟣</option>
    <option value="#22c55e">🟢</option>
    <option value="#3b82f6">🔵</option>
    <option value="#ef4444">🔴</option>
  </select>
  <select id="styleSelect">
    <option value="">Default</option>
    <option value="glass">Glass</option>
    <option value="neon">Neon</option>
    <option value="soft">Soft</option>
    <option value="minimal">Minimal</option>
  </select>
</div>

<a class="button" href="serials.html">← На главную</a>
<h1>Редактор</h1>

<div class="token-box">
    <label>GITHUB TOKEN</label>
    <input type="password" id="gh-token" placeholder="ghp_xxxxxx">
</div>

<div style="display:flex; gap:8px; flex-wrap:wrap; justify-content: center;">
  <button class="button saveBtn" onclick="saveAll()">💾 Сохранить везде <span class="saveCheck" id="saveCheck">✔</span></button>
  <button class="button" onclick="addNewLink()">➕ Добавить</button>
  <button class="button" onclick="loadFromCloud()">🔄 Обновить из облака</button>
  <button class="button" onclick="exportLinks()">📤 Экспорт</button>
  <button class="button" onclick="importLinks()">📥 Импорт</button>
</div>

<input type="file" id="fileInput" style="display:none;">
<div id="linksContainer"></div>

<script>
const OWNER = "bucketasmr";
const REPO = "my-serials-data";
const FILE_PATH = "my-serials.json";

let links = JSON.parse(localStorage.getItem("myLinks")) || [];
const container = document.getElementById("linksContainer");
const ghTokenInput = document.getElementById("gh-token");

ghTokenInput.value = localStorage.getItem("gh_token") || "";

function renderInputs() {
  container.innerHTML = "";
  links.forEach((link, i) => {
    const div = document.createElement("div");
    div.className = "linkBlock";
    div.draggable = true;
    div.innerHTML = `
      <input value="${link.name}" placeholder="Название" class="ln-name">
      <input value="${link.url}" placeholder="Ссылка" class="ln-url">
      <div class="controls">
        <button class="button" onclick="moveUp(${i})">⬆</button>
        <button class="button" onclick="moveDown(${i})">⬇</button>
        <button class="button" onclick="deleteLink(${i})">🗑</button>
      </div>
    `;
    div.addEventListener("dragstart", () => { draggedIndex = i; div.classList.add("dragging"); });
    div.addEventListener("dragend", () => { div.classList.remove("dragging"); updateLinksFromInputs(); });
    container.appendChild(div);
  });
}

let draggedIndex = null;
container.addEventListener("dragover", (e) => {
  e.preventDefault();
  const dragging = document.querySelector(".dragging");
  const afterElement = getClosestElement(e.clientX, e.clientY);
  if (!afterElement) container.appendChild(dragging);
  else container.insertBefore(dragging, afterElement);
});

function getClosestElement(x, y) {
  const elements = [...container.querySelectorAll(".linkBlock:not(.dragging)")];
  return elements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
    else return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

function updateLinksFromInputs() {
  const blocks = container.querySelectorAll(".linkBlock");
  links = [...blocks].map(block => ({
    name: block.querySelector(".ln-name").value,
    url: block.querySelector(".ln-url").value
  }));
}

async function saveAll() {
  updateLinksFromInputs();
  const token = ghTokenInput.value.trim();
  const btn = document.querySelector('.saveBtn');
  
  localStorage.setItem("myLinks", JSON.stringify(links));
  if(token) localStorage.setItem("gh_token", token);

  if (token) {
    btn.textContent = "⌛ Синхронизация...";
    try {
      const resInfo = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
        headers: { "Authorization": `token ${token}` }
      });
      const fileData = await resInfo.json();
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(links, null, 2))));
      
      const saveRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
        method: "PUT",
        headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({ message: "Update", content: content, sha: fileData.sha })
      });

      if (saveRes.ok) alert("Сохранено в облаке! 🚀");
      else alert("Ошибка GitHub. Проверьте токен.");
    } catch (e) { alert("Ошибка сети."); }
    btn.innerHTML = `💾 Сохранить везде <span class="saveCheck show">✔</span>`;
  } else {
    alert("Сохранено локально!");
  }
}

function moveUp(i){ if(i===0)return; updateLinksFromInputs(); [links[i],links[i-1]]=[links[i-1],links[i]]; renderInputs(); }
function moveDown(i){ if(i===links.length-1)return; updateLinksFromInputs(); [links[i],links[i+1]]=[links[i+1],links[i]]; renderInputs(); }
function deleteLink(i){ if(!confirm("Удалить?"))return; updateLinksFromInputs(); links.splice(i,1); renderInputs(); }
function addNewLink(){ updateLinksFromInputs(); links.unshift({name:"", url:""}); renderInputs(); }

function exportLinks(){
  updateLinksFromInputs();
  const blob = new Blob([JSON.stringify(links,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "my-serials.json";
  a.click();
}

function importLinks(){
  const input = document.getElementById("fileInput");
  input.click();
  input.onchange = () => {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = e => {
      links = JSON.parse(e.target.result);
      renderInputs();
    };
    reader.readAsText(file);
  };
}

async function loadFromCloud() {
  try {
    const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE_PATH}?t=${Date.now()}`;
    const res = await fetch(url, { cache: 'no-store', headers: {'Cache-Control': 'no-cache'} });
    const data = await res.json();
    if(Array.isArray(data)) {
        links = data;
        localStorage.setItem("myLinks", JSON.stringify(links));
        renderInputs();
        alert("Загружено из облака! ☁️");
    }
  } catch (e) { alert("Ошибка загрузки."); }
}

const colorSelect = document.getElementById("colorSelect");
const styleSelect = document.getElementById("styleSelect");
function applyTheme(){
  document.documentElement.style.setProperty('--accent', colorSelect.value);
  document.body.className = styleSelect.value;
  localStorage.setItem("themeColor", colorSelect.value);
  localStorage.setItem("themeStyle", styleSelect.value);
}
colorSelect.value = localStorage.getItem("themeColor") || "#ffb400";
styleSelect.value = localStorage.getItem("themeStyle") || "";
applyTheme();
colorSelect.onchange = applyTheme;
styleSelect.onchange = applyTheme;
renderInputs();
</script>
</body>
</html>
