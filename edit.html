<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Редактировать сериалы</title>
<style>
:root { --accent: #ffb400; --bg: #121212; --card: #1e1e1e; }
body { font-family: "Segoe UI", sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 40px; }
.themeBox { position: fixed; top: 15px; right: 15px; display: flex; gap: 5px; z-index: 100; }
select { background: #1e1e1e; color: white; border: 1px solid var(--accent); padding: 5px; border-radius: 4px; }
.token-box { background: var(--card); border: 1px dashed var(--accent); padding: 15px; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; }
.token-box label { font-size: 11px; color: var(--accent); display: block; margin-bottom: 5px; }
#linksContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; }
input { width: 100%; padding: 10px; margin-bottom: 8px; border: 2px solid var(--accent); border-radius: 6px; background-color: #1e1e1e; color: #fff; box-sizing: border-box; }
.button { background-color: var(--card); border: 2px solid var(--accent); color: var(--accent); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
.button:hover { background: var(--accent); color: black; }
.linkBlock { padding: 15px; border: 1px solid #444; border-radius: 10px; background: rgba(30,30,30,0.8); }
.controls { display: flex; gap: 5px; margin-top: 5px; }
.dragging { opacity: 0.5; }
</style>
</head>

<body>
<div class="themeBox">
  <select id="colorSelect"><option value="#ffb400">🟠</option><option value="#a855f7">🟣</option><option value="#22c55e">🟢</option></select>
  <select id="styleSelect"><option value="">Default</option><option value="glass">Glass</option></select>
</div>

<a class="button" href="serials.html">← На главную</a>
<h1>Редактор</h1>

<div class="token-box">
    <label>GITHUB TOKEN</label>
    <input type="password" id="gh-token" placeholder="ghp_xxxx">
</div>

<div style="display:flex; gap:8px; flex-wrap:wrap; justify-content: center;">
  <button class="button saveBtn" onclick="saveAll()">💾 Сохранить везде</button>
  <button class="button" onclick="addNewLink()">➕ Добавить</button>
  <button class="button" onclick="loadFromCloud()">🔄 Обновить из облака</button>
</div>

<div id="linksContainer"></div>

<script>
const OWNER = "bucketasmr", REPO = "my-serials-data", FILE_PATH = "my-serials.json";
let links = JSON.parse(localStorage.getItem("myLinks")) || [];
const ghTokenInput = document.getElementById("gh-token");
ghTokenInput.value = localStorage.getItem("gh_token") || "";

function renderInputs() {
  const container = document.getElementById("linksContainer");
  container.innerHTML = "";
  links.forEach((link, i) => {
    const div = document.createElement("div");
    div.className = "linkBlock";
    div.draggable = true;
    div.innerHTML = `
      <input value="${link.name}" placeholder="Название" class="ln-name">
      <input value="${link.url}" placeholder="Ссылка" class="ln-url">
      <div class="controls">
        <button class="button" onclick="moveUp(${i})">⬆</button>
        <button class="button" onclick="moveDown(${i})">⬇</button>
        <button class="button" onclick="deleteLink(${i})">🗑</button>
      </div>`;
    div.addEventListener("dragstart", () => { draggedIndex = i; div.classList.add("dragging"); });
    div.addEventListener("dragend", () => { div.classList.remove("dragging"); updateLinksFromInputs(); });
    container.appendChild(div);
  });
}

function updateLinksFromInputs() {
  links = [...document.querySelectorAll(".linkBlock")].map(block => ({
    name: block.querySelector(".ln-name").value,
    url: block.querySelector(".ln-url").value
  }));
}

async function saveAll() {
  updateLinksFromInputs();
  const token = ghTokenInput.value.trim();
  localStorage.setItem("myLinks", JSON.stringify(links));
  if(token) localStorage.setItem("gh_token", token);

  if (token) {
    const btn = document.querySelector('.saveBtn');
    btn.textContent = "⌛...";
    try {
      const resInfo = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
        headers: { "Authorization": `token ${token}` }
      });
      const fileData = await resInfo.json();
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(links, null, 2))));
      
      const saveRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
        method: "PUT",
        headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({ message: "Update", content: content, sha: fileData.sha })
      });
      if (saveRes.ok) alert("В облаке сохранено! 🚀");
    } catch (e) { alert("Ошибка GitHub."); }
    btn.textContent = "💾 Сохранить везде";
  }
}

function addNewLink(){ updateLinksFromInputs(); links.unshift({name:"", url:""}); renderInputs(); }
function deleteLink(i){ if(confirm("Удалить?")){ updateLinksFromInputs(); links.splice(i,1); renderInputs(); } }
function moveUp(i){ if(i>0){ updateLinksFromInputs(); [links[i],links[i-1]]=[links[i-1],links[i]]; renderInputs(); } }
function moveDown(i){ if(i<links.length-1){ updateLinksFromInputs(); [links[i],links[i+1]]=[links[i+1],links[i]]; renderInputs(); } }

async function loadFromCloud() {
  try {
    const res = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE_PATH}?t=${Date.now()}`, { mode: 'cors', cache: 'no-store' });
    const text = await res.text();
    const data = JSON.parse(text);
    if(Array.isArray(data)) { links = data; localStorage.setItem("myLinks", JSON.stringify(links)); renderInputs(); alert("Загружено! ☁️"); }
  } catch (e) { alert("Ошибка загрузки."); }
}

renderInputs();
</script>
</body>
</html>
