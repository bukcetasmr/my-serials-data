<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мои сериалы</title>

<style>
:root {
  --accent: #ffb400;
  --bg: #121212;
  --card: #1e1e1e;
  --cols: 4;
}

body {
  font-family: "Segoe UI", sans-serif;
  background: var(--bg);
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  padding: 40px;
}

.themeBox {
  position: fixed;
  top: 15px;
  right: 15px;
  display: flex;
  gap: 5px;
  z-index: 1001;
}

select {
  background: #1e1e1e;
  color: white;
  border: 1px solid var(--accent);
  padding: 5px;
  border-radius: 4px;
  cursor: pointer;
}

.searchBox {
  position: relative;
  width: 300px;
}

#search {
  padding: 10px 35px 10px 10px;
  width: 100%;
  border-radius: 8px;
  border: 1px solid var(--accent);
  background: #1e1e1e;
  color: white;
  outline: none;
}

#clearSearch {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #aaa;
  font-size: 14px;
  display: none;
  transition: 0.2s;
}

#clearSearch:hover {
  color: #ff4444;
}

#linksContainer {
  display: grid;
  grid-template-columns: repeat(var(--cols), 1fr);
  gap: 10px;
  width: 100%;
  max-width: 1200px;
}

h1 { 
  color: var(--accent); 
  text-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.button {
  box-sizing: border-box;
  background: var(--card);
  border: 2px solid var(--accent);
  color: var(--accent);
  padding: 15px;
  border-radius: 8px;
  transition: 0.2s;
  text-align: center;
  width: 100%;
  text-decoration: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 50px;
}

.button:hover {
  background: var(--accent);
  color: black;
  transform: scale(1.03);
}

.editBtn {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 1000;
  width: auto;
  padding: 10px 15px;
}

/* Стили тем */
.glass .button { backdrop-filter: blur(10px); background: rgba(30,30,30,0.6); }
.neon .button { box-shadow: 0 0 10px var(--accent); }
.soft .button { border-radius: 20px; }
.minimal .button { border: none; border-bottom: 2px solid var(--accent); border-radius: 0; }
.bold .button { font-weight: bold; }
</style>
</head>

<body>

<div class="themeBox">
  <select id="colorSelect">
    <option value="#ffb400">🟠</option>
    <option value="#a855f7">🟣</option>
    <option value="#22c55e">🟢</option>
    <option value="#3b82f6">🔵</option>
    <option value="#ef4444">🔴</option>
    <option value="#ec4899">🌸</option>
  </select>

  <select id="styleSelect">
    <option value="">Default</option>
    <option value="glass">Glass</option>
    <option value="neon">Neon</option>
    <option value="soft">Soft</option>
    <option value="minimal">Minimal</option>
    <option value="bold">Bold</option>
  </select>

  <select id="colsSelect">
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
  </select>
</div>

<a class="button editBtn" href="edit.html">Редактировать</a>
<button class="button" onclick="loadFromCloud()" style="width: auto; padding: 10px 20px; margin-bottom: 10px;">🔄 Обновить из облака</button>

<h1>Мои сериалы 🎬</h1>

<div class="searchBox">
  <input type="text" id="search" placeholder="🔍 Поиск по названию...">
  <span id="clearSearch">✖</span>
</div>

<div id="linksContainer"></div>

<script>
const OWNER = "bucketasmr", REPO = "my-serials-data", FILE_PATH = "my-serials.json";
const CLOUD_URL = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE_PATH}`;

let links = [];
const container = document.getElementById('linksContainer');
const searchInput = document.getElementById('search');
const clearBtn = document.getElementById('clearSearch');

async function chooseDataSource() {
  const localData = localStorage.getItem('myLinks');
  if (localData) {
    links = JSON.parse(localData);
    renderLinks();
  } else {
    await loadFromCloud();
  }
}

async function loadFromCloud() {
  try {
    const url = CLOUD_URL + "?t=" + Date.now();
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error("Cloud error");
    links = await res.json();
    localStorage.setItem('myLinks', JSON.stringify(links));
    renderLinks();
    console.log("Обновлено из облака ☁️");
  } catch (e) {
    console.error("Ошибка загрузки:", e);
    const saved = localStorage.getItem('myLinks');
    if (saved) links = JSON.parse(saved);
    renderLinks();
  }
}

function renderLinks(filter="") {
  container.innerHTML = "";
  links.forEach(link => {
    if (!link.name.toLowerCase().includes(filter.toLowerCase())) return;
    
    const a = document.createElement('a');
    a.className = "button";
    a.textContent = link.name;

    // Настройка ссылки
    if (!link.url || link.url.trim() === "" || link.url === "https://") {
      a.href = "#";
      a.onclick = (e) => { e.preventDefault(); alert("Добавь ссылку ⚠"); };
    } else {
      let url = link.url.trim();
      if (!/^[a-zA-Z]+:\/\//.test(url)) url = "https://" + url;
      a.href = url;
      a.target = "_blank";
    }

    // ЛОГИКА ИНДИВИДУАЛЬНОГО ЦВЕТА
    if (link.color && link.color.startsWith('#')) {
      // ПРИНУДИТЕЛЬНО ставим цвет из JSON
      a.style.setProperty('--accent', link.color);
      a.style.borderColor = link.color;
      a.style.color = link.color;
    } else {
      // СБРАСЫВАЕМ на переменную темы из CSS
      a.style.removeProperty('--accent');
      a.style.borderColor = "";
      a.style.color = "";
    }

    container.appendChild(a);
  });
}

// Управление темой (глобальное)
const colorSelect = document.getElementById("colorSelect");
const styleSelect = document.getElementById("styleSelect");
const colsSelect = document.getElementById("colsSelect");

function applyTheme() {
  const color = colorSelect.value;
  const style = styleSelect.value;
  const cols = colsSelect.value;

  document.documentElement.style.setProperty('--accent', color);
  document.documentElement.style.setProperty('--cols', cols);
  document.body.className = style;

  localStorage.setItem("themeColor", color);
  localStorage.setItem("themeStyle", style);
  localStorage.setItem("themeCols", cols);
  
  // Перерисовываем ссылки, чтобы обновить стили кнопок без цвета
  renderLinks(searchInput.value);
}

// Инициализация темы
colorSelect.value = localStorage.getItem("themeColor") || "#ffb400";
styleSelect.value = localStorage.getItem("themeStyle") || "";
colsSelect.value = localStorage.getItem("themeCols") || "4";

// Слушатели изменений
colorSelect.onchange = applyTheme;
styleSelect.onchange = applyTheme;
colsSelect.onchange = applyTheme;

// Поиск
searchInput.addEventListener("input", () => {
  renderLinks(searchInput.value);
  clearBtn.style.display = searchInput.value ? "block" : "none";
});

clearBtn.addEventListener("click", () => {
  searchInput.value = "";
  clearBtn.style.display = "none";
  renderLinks("");
});

// Запуск
chooseDataSource();
applyTheme();
</script>

</body>
</html>
